<!doctype html>
<html lang="en">
  <!doctype html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <title>3D Object Interaction</title>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
      <link rel="stylesheet" href="style.css" />
    </head>
    <body>
      <h1>3D Object Interaction Tool</h1>

      <div id="instructions">
        <h2>Controls</h2>
        <ul>
          <strong>Rotation:</strong>
          X, Y, Z keys (hold Shift for opposite rotation)
          <br /><br />
          <strong>Translation:</strong>
          Arrow keys or W, A, S, D for X/Y, F/G for Z
        </ul>
        <p>Use these keys to move and rotate the 3D cube in real-time.</p>
      </div>

      <!-- Canvas will automatically be created by p5.js -->
      <script src="script.js"></script>
    </body>
  </html>
</html>
